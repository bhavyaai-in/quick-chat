<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clipboard Bridge</title>
    <link rel="icon" type="image/png" href="/fav.png" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="homeView" class="view active">
        <div class="hero">
          <img src="/logo.png" alt="Clipboard Bridge" class="hero-logo" />
          <h1>Clipboard Bridge</h1>
          <p>Start by creating a session or joining one with a unique key.</p>
        </div>

        <div class="action-grid">
          <button id="showCreateBtn" class="action-card create">Create Session</button>
          <button id="showJoinBtn" class="action-card join">Join Session</button>
        </div>

        <section id="createPanel" class="panel hidden">
          <h2>New Session</h2>
          <p>Scan this QR using the camera app.</p>
          <p><strong>Session Key:</strong> <span id="sessionCode">-</span></p>
          <div id="qrBox" class="qr-box"></div>
        </section>

        <section id="joinPanel" class="panel hidden">
          <h2>Join with Key</h2>
          <label for="joinCode">Unique Key</label>
          <input id="joinCode" type="text" placeholder="e.g. A1B2C3D4" />
          <div class="row">
            <button id="joinBtn" class="primary">Join Session</button>
            <button id="scanBtn" class="ghost">Scan QR</button>
          </div>
          <div id="reader" class="reader hidden"></div>
        </section>
      </section>

      <section id="chatView" class="view">
        <div id="dropOverlay" class="drop-overlay hidden">
          <div class="drop-zone">
            <svg viewBox="0 0 48 48" width="48" height="48"><path d="M24 6v26M14 22l10 10 10-10M6 38h36" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <p class="drop-label">Drop files here</p>
          </div>
        </div>
        <header class="chat-header">
          <div>
            <h2>Session <span id="chatSessionCode">-</span></h2>
            <p id="statusLine">Waiting for peer...</p>
          </div>
          <button id="backBtn" class="ghost small">Leave</button>
        </header>

        <section id="chatMessages" class="chat-messages"></section>

        <footer class="chat-composer">
          <input id="textInput" type="text" placeholder="Type a message" />
          <input id="fileInput" type="file" class="hidden" multiple />
          <input id="cameraInput" type="file" class="hidden" accept="image/*" capture="environment" />
          <button id="cameraBtn" class="ghost composer-btn" aria-label="Camera" type="button">
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="13" r="4" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </button>
          <button id="attachBtn" class="ghost composer-btn" aria-label="Attach file" type="button">
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button id="sendBtn" class="primary composer-btn" aria-label="Send" type="button">
            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </footer>
      </section>
    </main>

    <section id="mediaViewer" class="media-viewer hidden">
      <button id="viewerCloseBtn" class="viewer-close" aria-label="Close viewer">Close</button>
      <div id="viewerContent" class="viewer-content"></div>
      <button id="viewerDownloadBtn" class="viewer-download">Download</button>
    </section>

    <section id="holdMenu" class="hold-menu hidden">
      <div class="hold-card">
        <button id="holdDownloadBtn" class="primary">Download</button>
        <button id="holdCancelBtn" class="ghost">Cancel</button>
      </div>
    </section>

    <script src="/vendor/socket.io/client-dist/socket.io.min.js"></script>
    <script src="/vendor/html5-qrcode/html5-qrcode.min.js" type="text/javascript"></script>
    <script src="/app.js"></script>
  </body>
</html>
